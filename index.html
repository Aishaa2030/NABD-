<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نبض الطاقة — منصة الصيانة التنبؤية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">

    <!-- ── TOP BAR ─────────────────────────────────────── -->
    <header class="top-bar">
      <div class="top-bar-left">
        <img src="logo.svg" class="logo-img" alt="نبض الطاقة">
        <div class="logo-divider"></div>
        <div class="logo-label">
          <span class="logo-title">نبض الطاقة</span>
          <span class="logo-sub">منصة الصيانة التنبؤية</span>
        </div>
      </div>
      <div class="top-bar-center">
        <div class="live-indicator">
          <span class="live-dot"></span>
          <span>بث مباشر</span>
          <span class="live-sep">|</span>
          <span>LIVE</span>
        </div>
      </div>
      <div class="top-bar-right">
        <div class="system-time" id="systemTime">00:00:00</div>
        <div class="status-pill">
          <span class="status-dot"></span>
          <span>النظام نشط</span>
        </div>
      </div>
    </header>

    <!-- ── MAIN GRID ────────────────────────────────────── -->
    <main class="main-grid">

      <!-- LEFT: Units Sidebar -->
      <aside class="units-sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">وحدات المحطة</span>
          <span class="units-badge">4</span>
        </div>
        <div class="units-list" id="unitsList"></div>
        <div class="sidebar-footer">
          <div class="alert-summary" id="alertSummary"></div>
        </div>
      </aside>

      <!-- CENTER: Interactive Plant Map -->
      <section class="map-section">
        <div class="map-header">
          <span class="map-title">خريطة المحطة التفاعلية</span>
          <div class="map-legend">
            <span class="legend-item"><span class="legend-dot low"></span>سليم</span>
            <span class="legend-item"><span class="legend-dot medium"></span>تحذير</span>
            <span class="legend-item"><span class="legend-dot high"></span>خطر</span>
          </div>
        </div>
        <div class="map-container">
          <svg id="plantMap" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
            <defs>
              <pattern id="gridPat" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#c8d8f0" stroke-width="0.5"/>
              </pattern>
              <filter id="glowFilter" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="5" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <linearGradient id="headerGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#dce8fc"/>
                <stop offset="100%" stop-color="#c8d8f8"/>
              </linearGradient>
            </defs>

            <!-- Background -->
            <rect width="800" height="500" fill="#eef4fd"/>
            <rect width="800" height="500" fill="url(#gridPat)"/>

            <!-- Ground line -->
            <line x1="0" y1="420" x2="800" y2="420" stroke="#b0c8e8" stroke-width="1.5"/>

            <!-- Steam pipe: Boiler → Turbine -->
            <polyline points="220,300 220,220 195,220 195,175" fill="none" stroke="#7aaae8" stroke-width="5" stroke-linecap="round"/>
            <!-- Steam label -->
            <text x="228" y="250" fill="#8aaac8" font-family="Inter" font-size="8">STEAM</text>
            <!-- Shaft: Turbine → Generator -->
            <line x1="300" y1="150" x2="460" y2="150" stroke="#a0bce0" stroke-width="4" stroke-dasharray="8,5"/>
            <!-- Fuel pipe: Fuel → Boiler -->
            <polyline points="510,355 510,310 280,310" fill="none" stroke="#a8c890" stroke-width="5" stroke-linecap="round"/>
            <!-- Cooling: Generator down -->
            <line x1="575" y1="200" x2="575" y2="420" stroke="#90c0d8" stroke-width="3" stroke-dasharray="6,4"/>

            <!-- ── TURBINE ── -->
            <g id="unit-bg-turbine">
              <rect x="100" y="75" width="200" height="150" rx="6" fill="url(#headerGrad)" stroke="#a8c0e0" stroke-width="1.5"/>
              <circle cx="200" cy="150" r="55" fill="none" stroke="#b8cce8" stroke-width="1.5"/>
              <circle cx="200" cy="150" r="35" fill="none" stroke="#b8cce8" stroke-width="1"/>
              <circle cx="200" cy="150" r="12" fill="#dce8fc" stroke="#a0b8e0" stroke-width="2"/>
              <line x1="200" y1="95"  x2="200" y2="122" stroke="#8aaace" stroke-width="2.5"/>
              <line x1="200" y1="178" x2="200" y2="205" stroke="#8aaace" stroke-width="2.5"/>
              <line x1="143" y1="150" x2="168" y2="150" stroke="#8aaace" stroke-width="2.5"/>
              <line x1="232" y1="150" x2="257" y2="150" stroke="#8aaace" stroke-width="2.5"/>
              <line x1="161" y1="111" x2="180" y2="130" stroke="#8aaace" stroke-width="2"/>
              <line x1="220" y1="170" x2="239" y2="189" stroke="#8aaace" stroke-width="2"/>
              <line x1="239" y1="111" x2="220" y2="130" stroke="#8aaace" stroke-width="2"/>
              <line x1="180" y1="170" x2="161" y2="189" stroke="#8aaace" stroke-width="2"/>
              <text x="200" y="243" text-anchor="middle" fill="#3a5a8a" font-family="Rajdhani" font-size="12" font-weight="700" letter-spacing="1">TURBINE</text>
              <text x="200" y="258" text-anchor="middle" fill="#6a8aaa" font-family="Inter" font-size="10">التوربين</text>
            </g>

            <!-- ── GENERATOR ── -->
            <g id="unit-bg-generator">
              <rect x="460" y="75" width="200" height="140" rx="6" fill="url(#headerGrad)" stroke="#a8c0e0" stroke-width="1.5"/>
              <rect x="478" y="93"  width="164" height="104" rx="4" fill="#d0e2f8"/>
              <rect x="492" y="107" width="136" height="76"  rx="3" fill="#c0d4f4"/>
              <path d="M508,107 Q528,145 508,183" fill="none" stroke="#9ab8e0" stroke-width="2"/>
              <path d="M528,107 Q548,145 528,183" fill="none" stroke="#9ab8e0" stroke-width="2"/>
              <path d="M548,107 Q568,145 548,183" fill="none" stroke="#9ab8e0" stroke-width="2"/>
              <path d="M568,107 Q588,145 568,183" fill="none" stroke="#9ab8e0" stroke-width="2"/>
              <path d="M588,107 Q608,145 588,183" fill="none" stroke="#9ab8e0" stroke-width="2"/>
              <text x="560" y="234" text-anchor="middle" fill="#3a5a8a" font-family="Rajdhani" font-size="12" font-weight="700" letter-spacing="1">GENERATOR</text>
              <text x="560" y="249" text-anchor="middle" fill="#6a8aaa" font-family="Inter" font-size="10">المولّد</text>
            </g>

            <!-- ── BOILER ── -->
            <g id="unit-bg-boiler">
              <rect x="120" y="258" width="160" height="162" rx="6" fill="url(#headerGrad)" stroke="#a8c0e0" stroke-width="1.5"/>
              <rect x="135" y="272" width="130" height="130" rx="3" fill="#d0e2f0"/>
              <line x1="155" y1="290" x2="155" y2="390" stroke="#a0bcd8" stroke-width="3"/>
              <line x1="175" y1="290" x2="175" y2="390" stroke="#a0bcd8" stroke-width="3"/>
              <line x1="195" y1="290" x2="195" y2="390" stroke="#a0bcd8" stroke-width="3"/>
              <line x1="215" y1="290" x2="215" y2="390" stroke="#a0bcd8" stroke-width="3"/>
              <line x1="235" y1="290" x2="235" y2="390" stroke="#a0bcd8" stroke-width="3"/>
              <!-- Flame glow -->
              <ellipse cx="200" cy="393" rx="42" ry="8" fill="#f97316" opacity="0.25"/>
              <ellipse cx="200" cy="395" rx="28" ry="5" fill="#fb923c" opacity="0.35"/>
              <text x="200" y="432" text-anchor="middle" fill="#3a5a8a" font-family="Rajdhani" font-size="12" font-weight="700" letter-spacing="1">BOILER</text>
              <text x="200" y="447" text-anchor="middle" fill="#6a8aaa" font-family="Inter" font-size="10">المرجل</text>
            </g>

            <!-- ── FUEL SYSTEM ── -->
            <g id="unit-bg-fuelSystem">
              <ellipse cx="548" cy="285" rx="38" ry="9" fill="#cce0d8" stroke="#90bca8" stroke-width="1.5"/>
              <rect x="510" y="285" width="76" height="95" fill="#d4e8dc" stroke="#90bca8" stroke-width="1.5"/>
              <ellipse cx="548" cy="380" rx="38" ry="9" fill="#cce0d8" stroke="#90bca8" stroke-width="1.5"/>
              <ellipse cx="635" cy="300" rx="30" ry="8" fill="#cce0d8" stroke="#90bca8" stroke-width="1.5"/>
              <rect x="605" y="300" width="60" height="80" fill="#d4e8dc" stroke="#90bca8" stroke-width="1.5"/>
              <ellipse cx="635" cy="380" rx="30" ry="8" fill="#cce0d8" stroke="#90bca8" stroke-width="1.5"/>
              <line x1="586" y1="335" x2="605" y2="335" stroke="#78a888" stroke-width="4"/>
              <text x="590" y="432" text-anchor="middle" fill="#3a5a8a" font-family="Rajdhani" font-size="12" font-weight="700" letter-spacing="1">FUEL SYSTEM</text>
              <text x="590" y="447" text-anchor="middle" fill="#6a8aaa" font-family="Inter" font-size="10">نظام الوقود</text>
            </g>

            <!-- Control Room -->
            <g>
              <rect x="338" y="340" width="110" height="80" rx="4" fill="#dce8fc" stroke="#a8c0e0" stroke-width="1"/>
              <rect x="348" y="350" width="90"  height="60" rx="2" fill="#c8d8f4"/>
              <line x1="358" y1="364" x2="428" y2="364" stroke="#9ab4d8" stroke-width="1"/>
              <line x1="358" y1="374" x2="428" y2="374" stroke="#9ab4d8" stroke-width="1"/>
              <line x1="358" y1="384" x2="428" y2="384" stroke="#9ab4d8" stroke-width="1"/>
              <text x="393" y="400" text-anchor="middle" fill="#4a6a9a" font-family="Rajdhani" font-size="10" letter-spacing="1">CONTROL</text>
            </g>

            <!-- ── HOTSPOT: Turbine ── -->
            <g id="hs-turbine" class="hotspot-group" data-unit="turbine" tabindex="0" role="button" aria-label="التوربين">
              <circle class="hs-ring" cx="200" cy="150" r="20" fill="none" stroke-width="2" opacity="0.3"/>
              <circle class="hs-core" cx="200" cy="150" r="9"  stroke-width="2.5"/>
              <circle class="hs-ping" cx="200" cy="150" r="9"  fill="none" stroke-width="2" opacity="0"/>
            </g>

            <!-- ── HOTSPOT: Generator ── -->
            <g id="hs-generator" class="hotspot-group" data-unit="generator" tabindex="0" role="button" aria-label="المولّد">
              <circle class="hs-ring" cx="560" cy="145" r="20" fill="none" stroke-width="2" opacity="0.3"/>
              <circle class="hs-core" cx="560" cy="145" r="9"  stroke-width="2.5"/>
              <circle class="hs-ping" cx="560" cy="145" r="9"  fill="none" stroke-width="2" opacity="0"/>
            </g>

            <!-- ── HOTSPOT: Boiler ── -->
            <g id="hs-boiler" class="hotspot-group" data-unit="boiler" tabindex="0" role="button" aria-label="المرجل">
              <circle class="hs-ring" cx="200" cy="339" r="20" fill="none" stroke-width="2" opacity="0.3"/>
              <circle class="hs-core" cx="200" cy="339" r="9"  stroke-width="2.5"/>
              <circle class="hs-ping" cx="200" cy="339" r="9"  fill="none" stroke-width="2" opacity="0"/>
            </g>

            <!-- ── HOTSPOT: Fuel System ── -->
            <g id="hs-fuelSystem" class="hotspot-group" data-unit="fuelSystem" tabindex="0" role="button" aria-label="نظام الوقود">
              <circle class="hs-ring" cx="590" cy="332" r="20" fill="none" stroke-width="2" opacity="0.3"/>
              <circle class="hs-core" cx="590" cy="332" r="9"  stroke-width="2.5"/>
              <circle class="hs-ping" cx="590" cy="332" r="9"  fill="none" stroke-width="2" opacity="0"/>
            </g>
          </svg>
        </div>
      </section>

      <!-- RIGHT: Diagnostic Detail Panel -->
      <aside class="detail-panel" id="detailPanel">
        <div class="detail-empty" id="detailEmpty">
          <div class="empty-icon">◎</div>
          <p>اضغط على وحدة أو معدة<br>لعرض التشخيص والتحليلات</p>
        </div>
        <div class="detail-content hidden" id="detailContent"></div>
      </aside>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
