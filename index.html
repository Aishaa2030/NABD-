<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NABD — نبض | منصة الصيانة التنبؤية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">

    <!-- ── TOP BAR ─────────────────────────────────────── -->
    <header class="top-bar">
      <div class="top-bar-left">
        <div class="logo">
          <span class="logo-pulse"></span>
          <span class="logo-text">NABD</span>
          <span class="logo-sep">|</span>
          <span class="logo-ar">نبض</span>
        </div>
        <div class="station-name">محطة الطاقة — الوحدة الأولى</div>
      </div>
      <div class="top-bar-center">
        <div class="live-indicator">
          <span class="live-dot"></span>
          <span>LIVE</span>
        </div>
      </div>
      <div class="top-bar-right">
        <div class="system-time" id="systemTime">00:00:00</div>
        <div class="status-bar">
          <span class="status-label">حالة النظام</span>
          <span class="status-badge">نشط</span>
        </div>
      </div>
    </header>

    <!-- ── MAIN GRID ────────────────────────────────────── -->
    <main class="main-grid">

      <!-- LEFT: Units Sidebar -->
      <aside class="units-sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">وحدات المحطة</span>
          <span class="units-count">4 وحدات</span>
        </div>
        <div class="units-list" id="unitsList"></div>
        <div class="sidebar-footer">
          <div class="alert-summary" id="alertSummary"></div>
        </div>
      </aside>

      <!-- CENTER: Interactive Plant Map -->
      <section class="map-section">
        <div class="map-header">
          <span class="map-title">خريطة المحطة التفاعلية</span>
          <div class="map-legend">
            <span class="legend-item"><span class="legend-dot low"></span>سليم</span>
            <span class="legend-item"><span class="legend-dot medium"></span>تحذير</span>
            <span class="legend-item"><span class="legend-dot high"></span>خطر</span>
          </div>
        </div>
        <div class="map-container">
          <svg id="plantMap" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
            <defs>
              <pattern id="gridPat" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161f30" stroke-width="0.6"/>
              </pattern>
              <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="4" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            <!-- Background -->
            <rect width="800" height="500" fill="#060a12"/>
            <rect width="800" height="500" fill="url(#gridPat)"/>

            <!-- Ground line -->
            <line x1="0" y1="420" x2="800" y2="420" stroke="#1a2840" stroke-width="1.5"/>
            <!-- Pipe: Boiler → Turbine (steam) -->
            <polyline points="220,300 220,220 195,220 195,175" fill="none" stroke="#1a3550" stroke-width="5" stroke-linecap="round"/>
            <!-- Pipe: Turbine → Generator (shaft) -->
            <line x1="300" y1="150" x2="460" y2="150" stroke="#1a2840" stroke-width="4" stroke-dasharray="8,5"/>
            <!-- Pipe: Fuel → Boiler -->
            <polyline points="570,355 570,310 280,310" fill="none" stroke="#2a2010" stroke-width="5" stroke-linecap="round"/>
            <!-- Cooling: Generator down -->
            <line x1="575" y1="200" x2="575" y2="420" stroke="#0d2020" stroke-width="4"/>

            <!-- ── TURBINE (top-left) ── -->
            <g id="unit-bg-turbine">
              <rect x="100" y="75" width="200" height="150" rx="4" fill="#0a1020" stroke="#1a2840" stroke-width="1.5"/>
              <circle cx="200" cy="150" r="55" fill="none" stroke="#122030" stroke-width="1.5"/>
              <circle cx="200" cy="150" r="35" fill="none" stroke="#122030" stroke-width="1"/>
              <circle cx="200" cy="150" r="10" fill="#0c1828" stroke="#1a3048" stroke-width="2"/>
              <line x1="200" y1="95"  x2="200" y2="122" stroke="#162840" stroke-width="2.5"/>
              <line x1="200" y1="178" x2="200" y2="205" stroke="#162840" stroke-width="2.5"/>
              <line x1="143" y1="150" x2="168" y2="150" stroke="#162840" stroke-width="2.5"/>
              <line x1="232" y1="150" x2="257" y2="150" stroke="#162840" stroke-width="2.5"/>
              <line x1="161" y1="111" x2="180" y2="130" stroke="#162840" stroke-width="2"/>
              <line x1="220" y1="170" x2="239" y2="189" stroke="#162840" stroke-width="2"/>
              <line x1="239" y1="111" x2="220" y2="130" stroke="#162840" stroke-width="2"/>
              <line x1="180" y1="170" x2="161" y2="189" stroke="#162840" stroke-width="2"/>
              <text x="200" y="243" text-anchor="middle" fill="#3a5a7a" font-family="Rajdhani" font-size="11" font-weight="600" letter-spacing="1">TURBINE</text>
              <text x="200" y="258" text-anchor="middle" fill="#2a3a50" font-family="Inter" font-size="9">التوربين</text>
            </g>

            <!-- ── GENERATOR (top-right) ── -->
            <g id="unit-bg-generator">
              <rect x="460" y="75" width="200" height="140" rx="4" fill="#0a1020" stroke="#1a2840" stroke-width="1.5"/>
              <rect x="478" y="93"  width="164" height="104" rx="3" fill="#070d18"/>
              <rect x="492" y="107" width="136" height="76"  rx="2" fill="#040810"/>
              <path d="M508,107 Q528,145 508,183" fill="none" stroke="#122030" stroke-width="2"/>
              <path d="M528,107 Q548,145 528,183" fill="none" stroke="#122030" stroke-width="2"/>
              <path d="M548,107 Q568,145 548,183" fill="none" stroke="#122030" stroke-width="2"/>
              <path d="M568,107 Q588,145 568,183" fill="none" stroke="#122030" stroke-width="2"/>
              <path d="M588,107 Q608,145 588,183" fill="none" stroke="#122030" stroke-width="2"/>
              <text x="560" y="234" text-anchor="middle" fill="#3a5a7a" font-family="Rajdhani" font-size="11" font-weight="600" letter-spacing="1">GENERATOR</text>
              <text x="560" y="249" text-anchor="middle" fill="#2a3a50" font-family="Inter" font-size="9">المولّد</text>
            </g>

            <!-- ── BOILER (bottom-left) ── -->
            <g id="unit-bg-boiler">
              <rect x="120" y="258" width="160" height="162" rx="4" fill="#0a1020" stroke="#1a2840" stroke-width="1.5"/>
              <rect x="135" y="272" width="130" height="130" rx="2" fill="#07100a"/>
              <line x1="155" y1="290" x2="155" y2="390" stroke="#102018" stroke-width="3"/>
              <line x1="175" y1="290" x2="175" y2="390" stroke="#102018" stroke-width="3"/>
              <line x1="195" y1="290" x2="195" y2="390" stroke="#102018" stroke-width="3"/>
              <line x1="215" y1="290" x2="215" y2="390" stroke="#102018" stroke-width="3"/>
              <line x1="235" y1="290" x2="235" y2="390" stroke="#102018" stroke-width="3"/>
              <ellipse cx="200" cy="390" rx="40" ry="7" fill="#251204" opacity="0.9"/>
              <text x="200" y="432" text-anchor="middle" fill="#3a5a7a" font-family="Rajdhani" font-size="11" font-weight="600" letter-spacing="1">BOILER</text>
              <text x="200" y="447" text-anchor="middle" fill="#2a3a50" font-family="Inter" font-size="9">المرجل</text>
            </g>

            <!-- ── FUEL SYSTEM (bottom-right) ── -->
            <g id="unit-bg-fuelSystem">
              <!-- Tank A -->
              <ellipse cx="548" cy="285" rx="38" ry="9" fill="#0a1020" stroke="#1a2840" stroke-width="1.5"/>
              <rect x="510" y="285" width="76" height="95" fill="#0a1020" stroke="#1a2840" stroke-width="1.5"/>
              <ellipse cx="548" cy="380" rx="38" ry="9" fill="#0a1020" stroke="#1a2840" stroke-width="1.5"/>
              <!-- Tank B -->
              <ellipse cx="635" cy="300" rx="30" ry="8" fill="#0a1020" stroke="#1a2840" stroke-width="1.5"/>
              <rect x="605" y="300" width="60" height="80" fill="#0a1020" stroke="#1a2840" stroke-width="1.5"/>
              <ellipse cx="635" cy="380" rx="30" ry="8" fill="#0a1020" stroke="#1a2840" stroke-width="1.5"/>
              <!-- Connector pipe -->
              <line x1="586" y1="335" x2="605" y2="335" stroke="#1e2a10" stroke-width="4"/>
              <text x="590" y="432" text-anchor="middle" fill="#3a5a7a" font-family="Rajdhani" font-size="11" font-weight="600" letter-spacing="1">FUEL SYSTEM</text>
              <text x="590" y="447" text-anchor="middle" fill="#2a3a50" font-family="Inter" font-size="9">نظام الوقود</text>
            </g>

            <!-- Control Room -->
            <g>
              <rect x="338" y="340" width="110" height="80" rx="3" fill="#080e1a" stroke="#121e2e" stroke-width="1"/>
              <rect x="348" y="350" width="90"  height="60" rx="2" fill="#050912"/>
              <line x1="358" y1="364" x2="428" y2="364" stroke="#142030" stroke-width="1"/>
              <line x1="358" y1="374" x2="428" y2="374" stroke="#142030" stroke-width="1"/>
              <line x1="358" y1="384" x2="428" y2="384" stroke="#142030" stroke-width="1"/>
              <text x="393" y="400" text-anchor="middle" fill="#1e3a52" font-family="Rajdhani" font-size="10" letter-spacing="1">CONTROL</text>
            </g>

            <!-- ── HOTSPOT: Turbine ── -->
            <g id="hs-turbine" class="hotspot-group" data-unit="turbine" style="cursor:pointer" tabindex="0" role="button" aria-label="Turbine unit">
              <circle class="hs-ring"  cx="200" cy="150" r="20" fill="none" stroke-width="1.5" opacity="0.25"/>
              <circle class="hs-core"  cx="200" cy="150" r="9"  stroke-width="2"/>
              <circle class="hs-ping"  cx="200" cy="150" r="9"  fill="none" stroke-width="1.5" opacity="0"/>
            </g>

            <!-- ── HOTSPOT: Generator ── -->
            <g id="hs-generator" class="hotspot-group" data-unit="generator" style="cursor:pointer" tabindex="0" role="button" aria-label="Generator unit">
              <circle class="hs-ring"  cx="560" cy="145" r="20" fill="none" stroke-width="1.5" opacity="0.25"/>
              <circle class="hs-core"  cx="560" cy="145" r="9"  stroke-width="2"/>
              <circle class="hs-ping"  cx="560" cy="145" r="9"  fill="none" stroke-width="1.5" opacity="0"/>
            </g>

            <!-- ── HOTSPOT: Boiler ── -->
            <g id="hs-boiler" class="hotspot-group" data-unit="boiler" style="cursor:pointer" tabindex="0" role="button" aria-label="Boiler unit">
              <circle class="hs-ring"  cx="200" cy="339" r="20" fill="none" stroke-width="1.5" opacity="0.25"/>
              <circle class="hs-core"  cx="200" cy="339" r="9"  stroke-width="2"/>
              <circle class="hs-ping"  cx="200" cy="339" r="9"  fill="none" stroke-width="1.5" opacity="0"/>
            </g>

            <!-- ── HOTSPOT: Fuel System ── -->
            <g id="hs-fuelSystem" class="hotspot-group" data-unit="fuelSystem" style="cursor:pointer" tabindex="0" role="button" aria-label="Fuel System unit">
              <circle class="hs-ring"  cx="590" cy="332" r="20" fill="none" stroke-width="1.5" opacity="0.25"/>
              <circle class="hs-core"  cx="590" cy="332" r="9"  stroke-width="2"/>
              <circle class="hs-ping"  cx="590" cy="332" r="9"  fill="none" stroke-width="1.5" opacity="0"/>
            </g>

          </svg>
        </div>
      </section>

      <!-- RIGHT: Diagnostic Detail Panel -->
      <aside class="detail-panel">
        <div class="detail-empty" id="detailEmpty">
          <div class="empty-icon">◎</div>
          <p>اختر وحدة أو معدة<br>لعرض بيانات التشخيص</p>
        </div>
        <div class="detail-content" id="detailContent" style="display:none"></div>
      </aside>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
