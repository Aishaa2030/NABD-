<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نبض الطاقة — منصة الصيانة التنبؤية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">

    <!-- ── TOP BAR ─────────────────────────────────────── -->
    <header class="top-bar">
      <div class="top-bar-left">
        <img src="logo.svg" class="logo-img" alt="نبض الطاقة">
        <div class="logo-divider"></div>
        <div class="logo-label">
          <span class="logo-title">نبض الطاقة</span>
          <span class="logo-sub">منصة الصيانة التنبؤية</span>
        </div>
      </div>
      <div class="top-bar-center">
        <div class="live-indicator">
          <span class="live-dot"></span>
          <span>بث مباشر</span>
          <span class="live-sep">|</span>
          <span>LIVE</span>
        </div>
      </div>
      <div class="top-bar-right">
        <div class="system-time" id="systemTime">00:00:00</div>
        <div class="status-pill">
          <span class="status-dot"></span>
          <span>النظام نشط</span>
        </div>
      </div>
    </header>

    <!-- ── MAIN GRID ────────────────────────────────────── -->
    <main class="main-grid">

      <!-- LEFT: Units Sidebar -->
      <aside class="units-sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">وحدات المحطة</span>
          <span class="units-badge">4</span>
        </div>
        <div class="units-list" id="unitsList"></div>
        <div class="sidebar-footer">
          <div class="alert-summary" id="alertSummary"></div>
        </div>
      </aside>

      <!-- CENTER: Interactive Plant Map -->
      <section class="map-section">
        <div class="map-header">
          <span class="map-title">خريطة المحطة التفاعلية</span>
          <div class="map-legend">
            <span class="legend-item"><span class="legend-dot low"></span>سليم</span>
            <span class="legend-item"><span class="legend-dot medium"></span>تحذير</span>
            <span class="legend-item"><span class="legend-dot high"></span>خطر</span>
          </div>
        </div>
        <div class="map-container">
          <svg id="plantMap" viewBox="0 0 920 580" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
            <defs>
              <!-- Ground texture -->
              <pattern id="groundDot" width="18" height="18" patternUnits="userSpaceOnUse">
                <circle cx="9" cy="9" r="0.6" fill="#d0ccbc" opacity="0.7"/>
              </pattern>
              <!-- Fine grid -->
              <pattern id="gridPat" width="46" height="46" patternUnits="userSpaceOnUse">
                <path d="M 46 0 L 0 0 0 46" fill="none" stroke="#cccabc" stroke-width="0.4"/>
              </pattern>
              <!-- Roof hatch pattern -->
              <pattern id="hatch45" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                <line x1="0" y1="0" x2="0" y2="7" stroke="#9aa8c0" stroke-width="0.8" opacity="0.25"/>
              </pattern>
              <!-- Boiler tube pattern -->
              <pattern id="tubePat" width="16" height="16" patternUnits="userSpaceOnUse">
                <circle cx="8" cy="8" r="5" fill="none" stroke="#8898b0" stroke-width="1" opacity="0.35"/>
              </pattern>
              <!-- Glow filter -->
              <filter id="glowFilter" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="5" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <!-- Drop shadow -->
              <filter id="bldShadow" x="-4%" y="-4%" width="112%" height="112%">
                <feDropShadow dx="4" dy="4" stdDeviation="4" flood-color="#8090a8" flood-opacity="0.28"/>
              </filter>
              <!-- Pipe arrow markers -->
              <marker id="arrSteam" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
                <path d="M0,1 L6,3.5 L0,6 Z" fill="#5a90d0"/>
              </marker>
              <marker id="arrFuel" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
                <path d="M0,1 L6,3.5 L0,6 Z" fill="#5aaa70"/>
              </marker>
              <marker id="arrCool" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
                <path d="M0,1 L6,3.5 L0,6 Z" fill="#40b8c8"/>
              </marker>
              <!-- Building gradients -->
              <linearGradient id="turbGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#d8e4f4"/><stop offset="100%" stop-color="#b8cce8"/>
              </linearGradient>
              <linearGradient id="genGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#d4e0f0"/><stop offset="100%" stop-color="#b4c8e4"/>
              </linearGradient>
              <linearGradient id="boilGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#f0e4d0"/><stop offset="100%" stop-color="#d8c8b0"/>
              </linearGradient>
              <linearGradient id="fuelGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#d0e8d4"/><stop offset="100%" stop-color="#b4d4b8"/>
              </linearGradient>
              <radialGradient id="tankTop" cx="40%" cy="35%" r="60%">
                <stop offset="0%" stop-color="#e8f4ec"/><stop offset="100%" stop-color="#a8c8b0"/>
              </radialGradient>
              <radialGradient id="flameGlow" cx="50%" cy="80%" r="60%">
                <stop offset="0%" stop-color="#fb923c" stop-opacity="0.5"/>
                <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
              </radialGradient>
            </defs>

            <!-- ═══ GROUND ═══ -->
            <rect width="920" height="580" fill="#e8e4d6"/>
            <rect width="920" height="580" fill="url(#groundDot)"/>
            <rect width="920" height="580" fill="url(#gridPat)"/>

            <!-- ═══ PERIMETER BOUNDARY ═══ -->
            <rect x="14" y="14" width="892" height="552" rx="3"
                  fill="none" stroke="#a8a898" stroke-width="1.5" stroke-dasharray="10,6"/>
            <!-- Corner markers -->
            <rect x="11" y="11" width="8" height="8" rx="1" fill="#909080"/>
            <rect x="901" y="11" width="8" height="8" rx="1" fill="#909080"/>
            <rect x="11"  y="561" width="8" height="8" rx="1" fill="#909080"/>
            <rect x="901" y="561" width="8" height="8" rx="1" fill="#909080"/>

            <!-- ═══ ROADS ═══ -->
            <!-- Main horizontal road (between top/bottom units) -->
            <rect x="14" y="256" width="892" height="26" fill="#d8d4c4"/>
            <!-- Center line -->
            <line x1="14" y1="269" x2="906" y2="269" stroke="#c8c418" stroke-width="1.2"
                  stroke-dasharray="28,20" opacity="0.5"/>
            <!-- Main vertical road -->
            <rect x="406" y="14" width="28" height="552" fill="#d8d4c4"/>
            <!-- Boiler-Control connector road -->
            <rect x="244" y="256" width="30" height="200" fill="#d8d4c4"/>

            <!-- ═══ PIPES (drawn behind buildings) ═══ -->
            <!-- STEAM: Boiler → Turbine (blue) -->
            <polyline points="175,255 175,218 195,218 195,195"
                      fill="none" stroke="#5a90d0" stroke-width="7"
                      stroke-linecap="round" stroke-linejoin="round" opacity="0.75"
                      marker-end="url(#arrSteam)"/>
            <!-- Steam pipe label -->
            <rect x="196" y="224" width="42" height="14" rx="3" fill="white" opacity="0.75"/>
            <text x="217" y="234" text-anchor="middle" fill="#4070b0"
                  font-family="Inter" font-size="9" font-weight="600">STEAM</text>

            <!-- SHAFT: Turbine → Generator (gold dashed) -->
            <line x1="336" y1="135" x2="542" y2="135"
                  stroke="#c8a030" stroke-width="5" stroke-dasharray="12,7" opacity="0.8"/>
            <rect x="396" y="124" width="52" height="14" rx="3" fill="white" opacity="0.75"/>
            <text x="422" y="134" text-anchor="middle" fill="#a07820"
                  font-family="Inter" font-size="9" font-weight="600">SHAFT</text>

            <!-- FUEL: Fuel System → Boiler (green) -->
            <polyline points="618,360 540,360 540,295 258,295 258,340 175,340"
                      fill="none" stroke="#5aaa70" stroke-width="7"
                      stroke-linecap="round" stroke-linejoin="round" opacity="0.75"
                      marker-end="url(#arrFuel)"/>
            <rect x="355" y="285" width="42" height="14" rx="3" fill="white" opacity="0.75"/>
            <text x="376" y="295" text-anchor="middle" fill="#3a8050"
                  font-family="Inter" font-size="9" font-weight="600">FUEL</text>

            <!-- COOLING: Generator → drain (cyan) -->
            <polyline points="618,178 618,256 668,256"
                      fill="none" stroke="#40b8c8" stroke-width="5"
                      stroke-linecap="round" stroke-linejoin="round" opacity="0.7"
                      marker-end="url(#arrCool)"/>

            <!-- POWER OUT: Generator → grid (red dashed) -->
            <line x1="762" y1="178" x2="762" y2="256"
                  stroke="#e05040" stroke-width="4" stroke-dasharray="8,5" opacity="0.7"/>
            <rect x="766" y="206" width="44" height="14" rx="3" fill="white" opacity="0.75"/>
            <text x="788" y="216" text-anchor="middle" fill="#c03020"
                  font-family="Inter" font-size="9" font-weight="600">POWER</text>

            <!-- ═══ TURBINE BUILDING ═══ -->
            <g id="unit-bg-turbine">
              <!-- Shadow -->
              <rect x="50" y="50" width="290" height="208" rx="5" fill="#8898b8" opacity="0.18"/>
              <!-- Body -->
              <rect x="46" y="46" width="290" height="208" rx="5"
                    fill="url(#turbGrad)" stroke="#7888b8" stroke-width="1.8"
                    filter="url(#bldShadow)"/>
              <!-- Roof hatch -->
              <rect x="56" y="56" width="270" height="188" rx="3" fill="url(#hatch45)"/>
              <!-- Structural grid lines -->
              <line x1="46"  y1="112" x2="336" y2="112" stroke="#7888b8" stroke-width="0.8" opacity="0.5"/>
              <line x1="46"  y1="178" x2="336" y2="178" stroke="#7888b8" stroke-width="0.8" opacity="0.5"/>
              <line x1="155" y1="46"  x2="155" y2="254" stroke="#7888b8" stroke-width="0.8" opacity="0.5"/>
              <line x1="230" y1="46"  x2="230" y2="254" stroke="#7888b8" stroke-width="0.8" opacity="0.5"/>
              <!-- TURBINE ROTOR (top view) -->
              <!-- Outer casing -->
              <circle cx="191" cy="150" r="78" fill="#c8d8f0" stroke="#6878b0" stroke-width="2"/>
              <!-- Mid ring -->
              <circle cx="191" cy="150" r="58" fill="#d4e4f8" stroke="#7888c0" stroke-width="1.5"/>
              <!-- Inner ring -->
              <circle cx="191" cy="150" r="38" fill="#dceeff" stroke="#8898cc" stroke-width="1.5"/>
              <!-- Hub -->
              <circle cx="191" cy="150" r="16" fill="#5870a8" stroke="#4060a0" stroke-width="2.5"/>
              <circle cx="191" cy="150" r="8"  fill="#7888c0"/>
              <!-- Blades (8 blades) -->
              <line x1="191" y1="72"  x2="191" y2="112" stroke="#4060a0" stroke-width="5" stroke-linecap="round"/>
              <line x1="191" y1="188" x2="191" y2="228" stroke="#4060a0" stroke-width="5" stroke-linecap="round"/>
              <line x1="113" y1="150" x2="153" y2="150" stroke="#4060a0" stroke-width="5" stroke-linecap="round"/>
              <line x1="229" y1="150" x2="269" y2="150" stroke="#4060a0" stroke-width="5" stroke-linecap="round"/>
              <line x1="136" y1="95"  x2="164" y2="123" stroke="#4060a0" stroke-width="4" stroke-linecap="round"/>
              <line x1="218" y1="177" x2="246" y2="205" stroke="#4060a0" stroke-width="4" stroke-linecap="round"/>
              <line x1="246" y1="95"  x2="218" y2="123" stroke="#4060a0" stroke-width="4" stroke-linecap="round"/>
              <line x1="164" y1="177" x2="136" y2="205" stroke="#4060a0" stroke-width="4" stroke-linecap="round"/>
              <!-- Steam inlet port (left wall) -->
              <rect x="46" y="140" width="14" height="20" rx="2" fill="#4878c8"/>
              <rect x="60" y="142" width="6"  height="16" rx="1" fill="#6898e0"/>
              <!-- Steam outlet port (right wall) -->
              <rect x="316" y="140" width="14" height="20" rx="2" fill="#4878c8"/>
              <!-- Access door (bottom) -->
              <rect x="174" y="246" width="34" height="8" rx="2" fill="#4060a0" opacity="0.7"/>
              <!-- Ventilation fans (corners) -->
              <circle cx="66"  cy="66"  r="12" fill="#b8c8e4" stroke="#8898c0" stroke-width="1"/>
              <line x1="60" y1="66" x2="72" y2="66" stroke="#7888b0" stroke-width="1.5"/>
              <line x1="66" y1="60" x2="66" y2="72" stroke="#7888b0" stroke-width="1.5"/>
              <circle cx="316" cy="66"  r="12" fill="#b8c8e4" stroke="#8898c0" stroke-width="1"/>
              <line x1="310" y1="66" x2="322" y2="66" stroke="#7888b0" stroke-width="1.5"/>
              <line x1="316" y1="60" x2="316" y2="72" stroke="#7888b0" stroke-width="1.5"/>
            </g>
            <!-- Turbine label -->
            <text x="191" y="274" text-anchor="middle" fill="#1a2a60"
                  font-family="Rajdhani" font-size="14" font-weight="700" letter-spacing="2">TURBINE</text>
            <text x="191" y="290" text-anchor="middle" fill="#4a5a90"
                  font-family="Inter" font-size="10">التوربين</text>

            <!-- ═══ GENERATOR BUILDING ═══ -->
            <g id="unit-bg-generator">
              <!-- Shadow -->
              <rect x="548" y="50" width="226" height="136" rx="5" fill="#8898b8" opacity="0.18"/>
              <!-- Body -->
              <rect x="544" y="46" width="226" height="136" rx="5"
                    fill="url(#genGrad)" stroke="#7888b8" stroke-width="1.8"
                    filter="url(#bldShadow)"/>
              <!-- Roof hatch -->
              <rect x="554" y="56" width="206" height="116" rx="3" fill="url(#hatch45)"/>
              <!-- Structural lines -->
              <line x1="544" y1="100" x2="770" y2="100" stroke="#7888b8" stroke-width="0.8" opacity="0.5"/>
              <line x1="620" y1="46"  x2="620" y2="182" stroke="#7888b8" stroke-width="0.8" opacity="0.5"/>
              <line x1="700" y1="46"  x2="700" y2="182" stroke="#7888b8" stroke-width="0.8" opacity="0.5"/>
              <!-- GENERATOR COIL symbol -->
              <rect x="564" y="62" width="196" height="100" rx="4" fill="#c4d8f0" opacity="0.6"/>
              <!-- Stator coil waves -->
              <path d="M574,82 Q584,68 594,82 Q604,96 614,82 Q624,68 634,82 Q644,96 654,82 Q664,68 674,82 Q684,96 694,82 Q704,68 714,82 Q724,96 734,82 Q744,68 750,82"
                    fill="none" stroke="#5878b8" stroke-width="2.5" stroke-linecap="round"/>
              <path d="M574,114 Q584,100 594,114 Q604,128 614,114 Q624,100 634,114 Q644,128 654,114 Q664,100 674,114 Q684,128 694,114 Q704,100 714,114 Q724,128 734,114 Q744,100 750,114"
                    fill="none" stroke="#5878b8" stroke-width="2.5" stroke-linecap="round"/>
              <path d="M574,146 Q584,132 594,146 Q604,160 614,146 Q624,132 634,146 Q644,160 654,146 Q664,132 674,146 Q684,160 694,146 Q704,132 714,146 Q724,160 734,146 Q744,132 750,146"
                    fill="none" stroke="#5878b8" stroke-width="2.5" stroke-linecap="round"/>
              <!-- Rotor center shaft -->
              <line x1="544" y1="114" x2="770" y2="114" stroke="#90a8d0" stroke-width="3" stroke-dasharray="6,4" opacity="0.5"/>
              <!-- Cooling fins (right side) -->
              <rect x="762" y="56"  width="8" height="12" rx="1" fill="#8898c0"/>
              <rect x="762" y="74"  width="8" height="12" rx="1" fill="#8898c0"/>
              <rect x="762" y="92"  width="8" height="12" rx="1" fill="#8898c0"/>
              <rect x="762" y="110" width="8" height="12" rx="1" fill="#8898c0"/>
              <rect x="762" y="128" width="8" height="12" rx="1" fill="#8898c0"/>
              <rect x="762" y="146" width="8" height="12" rx="1" fill="#8898c0"/>
              <!-- Ventilation fans -->
              <circle cx="564" cy="66"  r="10" fill="#b4c8e4" stroke="#7888b8" stroke-width="1"/>
              <line x1="558" y1="66" x2="570" y2="66" stroke="#6878a8" stroke-width="1.5"/>
              <line x1="564" y1="60" x2="564" y2="72" stroke="#6878a8" stroke-width="1.5"/>
              <!-- Power output terminal -->
              <rect x="752" y="104" width="18" height="20" rx="2" fill="#d05040"/>
              <circle cx="761" cy="114" r="4" fill="#e87060"/>
            </g>
            <!-- Generator label -->
            <text x="657" y="204" text-anchor="middle" fill="#1a2a60"
                  font-family="Rajdhani" font-size="14" font-weight="700" letter-spacing="2">GENERATOR</text>
            <text x="657" y="220" text-anchor="middle" fill="#4a5a90"
                  font-family="Inter" font-size="10">المولّد</text>

            <!-- ═══ BOILER BUILDING ═══ -->
            <g id="unit-bg-boiler">
              <!-- Chimney stacks (behind main building) -->
              <rect x="108" y="282" width="22" height="26" rx="2" fill="#c0b8a8" stroke="#a0988a" stroke-width="1.5"/>
              <rect x="138" y="282" width="22" height="26" rx="2" fill="#c0b8a8" stroke="#a0988a" stroke-width="1.5"/>
              <!-- Shadow -->
              <rect x="52" y="310" width="200" height="220" rx="5" fill="#9090788" opacity="0.15"/>
              <!-- Body -->
              <rect x="48" y="306" width="200" height="220" rx="5"
                    fill="url(#boilGrad)" stroke="#a09080" stroke-width="1.8"
                    filter="url(#bldShadow)"/>
              <!-- Roof hatch -->
              <rect x="58" y="316" width="180" height="200" rx="3" fill="url(#hatch45)"/>
              <!-- Structural lines -->
              <line x1="48"  y1="360" x2="248" y2="360" stroke="#a09080" stroke-width="0.8" opacity="0.6"/>
              <line x1="48"  y1="420" x2="248" y2="420" stroke="#a09080" stroke-width="0.8" opacity="0.6"/>
              <line x1="110" y1="306" x2="110" y2="526" stroke="#a09080" stroke-width="0.8" opacity="0.6"/>
              <line x1="180" y1="306" x2="180" y2="526" stroke="#a09080" stroke-width="0.8" opacity="0.6"/>
              <!-- BOILER tube bundles (top view) -->
              <rect x="62" y="320" width="176" height="196" rx="2" fill="url(#tubePat)"/>
              <!-- Header pipes (horizontal) -->
              <rect x="58" y="340" width="184" height="8" rx="3" fill="#8090a8" opacity="0.5"/>
              <rect x="58" y="400" width="184" height="8" rx="3" fill="#8090a8" opacity="0.5"/>
              <rect x="58" y="460" width="184" height="8" rx="3" fill="#8090a8" opacity="0.5"/>
              <!-- Furnace zone (bottom) -->
              <rect x="70" y="480" width="156" height="36" rx="3" fill="url(#flameGlow)"/>
              <ellipse cx="148" cy="516" rx="60" ry="10" fill="#fb923c" opacity="0.3"/>
              <!-- Feed water inlet -->
              <rect x="48" y="350" width="14" height="18" rx="2" fill="#4878c8"/>
              <!-- Steam outlet (top) -->
              <rect x="120" y="306" width="22" height="10" rx="2" fill="#4878c8"/>
            </g>
            <!-- Boiler label -->
            <text x="148" y="546" text-anchor="middle" fill="#1a2a60"
                  font-family="Rajdhani" font-size="14" font-weight="700" letter-spacing="2">BOILER</text>
            <text x="148" y="562" text-anchor="middle" fill="#4a5a90"
                  font-family="Inter" font-size="10">المرجل</text>

            <!-- ═══ FUEL SYSTEM (TANK FARM) ═══ -->
            <g id="unit-bg-fuelSystem">
              <!-- Bund wall / containment -->
              <rect x="544" y="296" width="326" height="236" rx="5"
                    fill="#d4e8d4" stroke="#88b888" stroke-width="2" stroke-dasharray="6,4"/>
              <!-- Tank A (large) - top view -->
              <circle cx="628" cy="350" r="52" fill="#c0d8c0" stroke="#70a870" stroke-width="2"/>
              <circle cx="628" cy="350" r="52" fill="url(#tankTop)"/>
              <circle cx="628" cy="350" r="40" fill="none" stroke="#90b890" stroke-width="1" opacity="0.6"/>
              <circle cx="628" cy="350" r="26" fill="none" stroke="#90b890" stroke-width="1" opacity="0.4"/>
              <circle cx="628" cy="350" r="10" fill="#70a870" stroke="#508850" stroke-width="1.5"/>
              <!-- Tank shadow lines -->
              <path d="M628,300 A48,48 0 0,1 676,350" fill="none" stroke="#508850" stroke-width="1.5" opacity="0.3"/>
              <!-- Tank B (medium) -->
              <circle cx="760" cy="340" r="40" fill="#c0d8c0" stroke="#70a870" stroke-width="2"/>
              <circle cx="760" cy="340" r="40" fill="url(#tankTop)"/>
              <circle cx="760" cy="340" r="30" fill="none" stroke="#90b890" stroke-width="1" opacity="0.5"/>
              <circle cx="760" cy="340" r="18" fill="none" stroke="#90b890" stroke-width="1" opacity="0.4"/>
              <circle cx="760" cy="340" r="8"  fill="#70a870" stroke="#508850" stroke-width="1.5"/>
              <path d="M760,302 A36,36 0 0,1 796,340" fill="none" stroke="#508850" stroke-width="1.5" opacity="0.3"/>
              <!-- Tank C (small, bottom-left) -->
              <circle cx="614" cy="468" r="32" fill="#c0d8c0" stroke="#70a870" stroke-width="2"/>
              <circle cx="614" cy="468" r="32" fill="url(#tankTop)"/>
              <circle cx="614" cy="468" r="22" fill="none" stroke="#90b890" stroke-width="1" opacity="0.5"/>
              <circle cx="614" cy="468" r="7"  fill="#70a870" stroke="#508850" stroke-width="1.5"/>
              <!-- Tank D (small, bottom-right) -->
              <circle cx="760" cy="460" r="30" fill="#c0d8c0" stroke="#70a870" stroke-width="2"/>
              <circle cx="760" cy="460" r="30" fill="url(#tankTop)"/>
              <circle cx="760" cy="460" r="20" fill="none" stroke="#90b890" stroke-width="1" opacity="0.5"/>
              <circle cx="760" cy="460" r="7"  fill="#70a870" stroke="#508850" stroke-width="1.5"/>

              <circle class="hs-ring" cx="657" cy="114" r="22" fill="none" stroke-width="2" opacity="0.25"/>
              <circle class="hs-core" cx="657" cy="114" r="10" stroke-width="2.5"/>
              <circle class="hs-ping" cx="657" cy="114" r="10" fill="none" stroke-width="2" opacity="0"/>

              <circle class="hs-ping" cx="690" cy="400" r="10" fill="none" stroke-width="2" opacity="0"/>

          </svg>
        </div>
      </section>

      <!-- RIGHT: Diagnostic Detail Panel -->
      <aside class="detail-panel" id="detailPanel">

        <div class="detail-content hidden" id="detailContent"></div>
      </aside>

    </main>
  </div>

  <script src="app.js"></script>
</body>
